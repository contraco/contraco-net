name: Compile and Deploy Secure Contact Card

on:
  push:
    branches:
      - main

# This opens the precise permission gate required to allow the bot to write the file back to your repo
permissions:
  contents: write

jobs:
  build-vcard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Public Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Uses the native runtime token to authorize the write operation

    - name: Install Image Processing Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick

    - name: Securely Fetch Raw vCard Template
      run: |
        curl -H "Authorization: token ${{ secrets.VAULT_ACCESS_TOKEN }}" \
             -H "Accept: application/vnd.github.v3.raw" \
             -o base_card.vcf \
             -L https://api.github.com/repos/contraco/vault/contents/x9_2f81ba0bc.vcf

    - name: Securely Fetch High-Res Portrait
      run: |
        curl -H "Authorization: token ${{ secrets.VAULT_ACCESS_TOKEN }}" \
             -H "Accept: application/vnd.github.v3.raw" \
             -o profile.jpg \
             -L https://api.github.com/repos/contraco/vault/contents/13x18-1M0B4672.jpg

    - name: Process Image and Compile Final Master vCard
      run: |
        # 1. Resize the image cleanly
        convert profile.jpg -resize 300x300 optimized_photo.jpg

        # 2. Convert image binary to clean 72-character wrapped Base64 text
        base64 optimized_photo.jpg | awk '{print " " $0}' > photo_base64.txt

        # 3. Inject the photo block right before the END marker
        sed -i '/END:VCARD/d' base_card.vcf
        echo "PHOTO;TYPE=JPEG;ENCODING=BASE64:" >> base_card.vcf
        cat photo_base64.txt >> base_card.vcf
        echo "END:VCARD" >> base_card.vcf

        # 4. Smart Layout Detection: Place the file where your website lives
        if [ -d "./public" ]; then
          mv base_card.vcf ./public/x9_2f81ba0bc.vcf
        elif [ -d "./docs" ]; then
          mv base_card.vcf ./docs/x9_2f81ba0bc.vcf
        else
          mv base_card.vcf ./x9_2f81ba0bc.vcf
        fi

    - name: Commit and Push Compiled vCard to Site
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/contraco/contraco-net.git
        git add .
        # Avoids empty commit failures if the file didn't change
        git diff-index --quiet HEAD || git commit -m "Automated update: Compiled master vCard with secure profile image"
        git push origin main
